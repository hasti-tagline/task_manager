{% load static %}
<!DOCTYPE html>
<html>

<head>
  <title>Create Task</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">

            <h3 class="mb-4">Create Task</h3>

            <!-- TITLE -->
            <div class="mb-3">
            <label class="form-label">Title</label>
            <input id="title" class="form-control" placeholder="Enter task title">
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control" placeholder="Enter task description"></textarea>
            </div>

            <!-- PRIORITY -->
            <div class="mb-3">
            <label class="form-label">Priority</label>
            <select id="priority" class="form-select">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
            </div>

            <!-- DUE DATE -->
            <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input id="due_date" type="date" class="form-control">
            </div>

            <!-- ASSIGN TO -->
            <div class="mb-3">
            <label class="form-label">Assign To</label>
            <select id="assigned_to" class="form-select" multiple></select>
            <small class="text-muted">
                Hold Ctrl (Windows) / Cmd (Mac) for multiple selection
            </small>
            </div>

            <!-- FILE -->
            <div class="mb-3">
            <label class="form-label">Upload File</label>
            <input id="file" type="file" class="form-control">
            </div>

            <!-- BUTTONS -->
            <button class="btn btn-success w-100" onclick="createTask()">Create Task</button>
            <a href="/dashboard/" class="btn btn-secondary w-100 mt-2">Back</a>

  </div>

</div>

<script src="{% static 'js/auth.js' %}"></script>


<script>

// load all employees fr assign task
authFetch("/api/users/")
.then(res => res.json())
.then(users => {

    let select = document.getElementById("assigned_to")

    const userList = users.data.results || users.data

    userList.forEach(user => {
        let option = document.createElement("option")
        option.value = user.id
        option.textContent = `${user.username} (${user.role})`
        select.appendChild(option)
    })
})
.catch(err => {
    console.log("Users Error:", err)
})



// create task
function createTask(){

    let formData = new FormData()
    console.log(document.getElementById("description").value)
    formData.append("title", document.getElementById("title").value)
    formData.append("description", document.getElementById("description").value)
    formData.append("priority", document.getElementById("priority").value)
    formData.append("due_date", document.getElementById("due_date").value)
    
    //MULTIPLE USERS FIX
    let selectedUsers = Array.from(
        document.getElementById("assigned_to").selectedOptions
    ).map(opt => opt.value)

    selectedUsers.forEach(id => {
        formData.append("assigned_to", id)
    })

    // FILE FIX (IMPORTANT)
    let fileInput = document.getElementById("file")
    if (fileInput.files.length > 0) {
        formData.append("attachment", fileInput.files[0])
    }

    authFetch("/api/tasks/", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        console.log(data)
        alert("Task Created Successfully")
        window.location.href = "/dashboard/"
    })
}


</script>

</html>
