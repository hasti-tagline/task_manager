{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>Chat</h3>
    <a href="/dashboard/" class="btn btn-secondary mt-3">Back</a>

    <br>
    <br>
    <div
        id="chatBox"
        class="border p-3 mb-3"
        style="height:600px; overflow-y:auto;">
    </div>

    <div class="input-group">

        <input type="text" id="messageInput" class="form-control" placeholder="Type message">

        <button class="btn btn-primary" onclick="sendMessage()">
            Send
        </button>

    </div>

</div>



<script src="{% static 'js/auth.js' %}"></script>
<script>

const currentUserId = localStorage.getItem("user_id");

const taskId = new URLSearchParams(window.location.search).get("task");

console.log("Task Id :",taskId)
console.log("Current User:", currentUserId);


if (!taskId) {
    alert("Task ID missing");
    throw new Error("Task ID missing");
}

// Chat WebSocket
const socket = new WebSocket(
    `ws://localhost:8000/ws/chat/${taskId}/`
);

socket.onopen = function () {
    console.log("Chat Connected");
};

socket.onclose = function () {
    console.log("Chat Disconnected");
};

socket.onerror = function (error) {
    console.log("Socket Error:", error);
};

socket.onmessage = function(event){

    const data = JSON.parse(event.data);
    console.log("Received:", data);

    const chatBox = document.getElementById("chatBox");

    if (String(data.sender_id) === String(currentUserId)) {

        chatBox.innerHTML += `
            <div class="mb-2 text-end">
                <b>Me:</b> ${data.message}
            </div>
        `;

    } else {

        chatBox.innerHTML += `
            <div class="mb-2">
                <b>User ${data.sender_id}:</b> ${data.message}
            </div>
        `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
};





// Load chat history
function loadChatHistory() {

    authFetch(`/api/chat/messages/?task=${taskId}`)
        .then(res => {

            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }

            return res.json();
        })
        .then(data => {

            const box = document.getElementById("chatBox");
            box.innerHTML = "";

            data.data.forEach(msg => {

                if (String(msg.sender_id) === String(currentUserId)) {

                    box.innerHTML += `
                        <div class="mb-2 text-end">
                            <b>Me:</b> ${msg.message}
                        </div>
                    `;

                } else {

                    box.innerHTML += `
                        <div class="mb-2">
                            <b>User ${msg.sender_id}:</b> ${msg.message}
                        </div>
                    `;
                }
            });

            box.scrollTop = box.scrollHeight;
        })
        .catch(error => {
            console.error("Failed to load messages:", error);
        });
}


// Send message
function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if (!message) {
        return;
    }

    if (socket.readyState !== WebSocket.OPEN) {
        alert("Chat not connected");
        return;
    }

    socket.send(
        JSON.stringify({
            sender_id: currentUserId,
            message: message
        })
    );

    input.value = "";
}


// user can press enter to send message
document
    .getElementById("messageInput")
    .addEventListener("keypress", function(e){

        if (e.key === "Enter") {
            sendMessage();
        }
    });


// Load old messages
loadChatHistory();

</script>

</body>
</html>
