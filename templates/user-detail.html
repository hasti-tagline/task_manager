{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>User Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3>User Details</h3>

        <div id="userInfo"></div>

        <hr>

        <h4>Assigned Tasks</h4>

        <div id="taskSection">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Created_by</th>
                        
                        
                       
                    </tr>
                </thead>
                <tbody id="taskList"></tbody>
            </table>
        </div>
        <hr>
        <a href="/dashboard/" class="btn btn-secondary mt-3">Back</a>

    </div>

</div>

<script src="{% static 'js/auth.js' %}"></script>


<script>

const userId = new URLSearchParams(window.location.search).get("id");


Promise.all([
    authFetch(`/api/users/${userId}/user/`).then(res => res.json()),
    authFetch(`/api/users/${userId}/tasks/`).then(res => res.json())
])

.then(([user, tasks]) => {

    // USER INFO
    document.getElementById("userInfo").innerHTML = `
        <p><b>Username:</b> ${user.data.username}</p>
        <p><b>Email:</b> ${user.data.email}</p>
        <p><b>Role:</b> ${user.data.role}</p>
        <p><b>Api Key:</b> ${user.data.api_key}</p>
        <p><b>Total Tasks:</b> ${user.data.total_tasks}</p>
    `;

    let output = "";

    tasks.data.forEach(task => {

        output += `
        <tr>
            <td>${task.id}</td>
            <td>${task.title}</td>
            <td>${task.description}</td>
            <td>${task.status}</td>
            <td>${task.priority}</td>
            <td>${task.due_date}</td>
            <td>${task.created_by_name}</td>
        </tr>
        `;
    });

    document.getElementById("taskList").innerHTML = output;

});

</script>

</body>
</html>
